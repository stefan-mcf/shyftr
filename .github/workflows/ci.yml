name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -e ".[dev,service]"
      - name: Run tests
        run: python -m pytest -q
      - name: CLI help smoke
        run: python -m shyftr.cli --help >/dev/null

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -e ".[dev,service]"
      - name: Run local lifecycle
        run: bash examples/run-local-lifecycle.sh
      - name: Public readiness
        run: python scripts/public_readiness_check.py

  console-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - name: Install console dependencies
        run: npm ci
      - name: Build console
        run: npm run build
      - name: Audit production dependencies
        run: npm audit --omit=dev
