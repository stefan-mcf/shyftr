name: Alpha test report
description: Structured public-safe report from a ShyftR alpha tester
title: "Alpha test report: <OS> / <SHA>"
labels: ["alpha-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing ShyftR. Use synthetic or intentionally non-sensitive data only. Do not paste secrets, API keys, customer data, employer data, regulated data, production memory, or private local paths.
  - type: input
    id: sha
    attributes:
      label: Exact git SHA tested
      description: Run `git rev-parse HEAD` in the clone.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS family
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "Python 3.11.9"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node/npm version
      placeholder: "node v20.x / npm 10.x, or not installed"
    validations:
      required: true
  - type: dropdown
    id: gate
    attributes:
      label: Alpha gate verdict
      options:
        - ALPHA_GATE_READY
        - Failed before install completed
        - Failed during tests
        - Failed during console build/audit
        - Not run
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: Install friction or full error output
      description: If anything failed, paste the relevant terminal output.
    validations:
      required: true
  - type: dropdown
    id: lifecycle
    attributes:
      label: Lifecycle/demo result
      options:
        - Understood evidence -> candidate -> memory -> pack -> feedback
        - Partially understood
        - Confusing
        - Not run
    validations:
      required: true
  - type: textarea
    id: clarity
    attributes:
      label: Concept clarity and product value
      description: What made sense, what did not, and whether you would try this on a real non-sensitive local project.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety confirmation
      options:
        - label: I used only synthetic or intentionally non-sensitive test data and did not paste secrets or private data into this report.
          required: true
